<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Security Scan</title>
<div id="typing"></div>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

#typing{
    color:#00ff00;
    font-family:Consolas, monospace;
    font-size:20px;
    margin-top:20px;
    white-space:pre-line;
    text-shadow:0 0 8px #00ff00;
}
body{
background:#000;
color:#00ff00;
font-family:Consolas,monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#terminal{
padding:20px;
font-size:22px;
line-height:1.7;
}

.glow{
text-shadow:0 0 10px #00ff00;
}

.progress{
width:80%;
height:25px;
border:2px solid #00ff00;
margin:30px auto;
}

.bar{
height:100%;
width:0%;
background:#00ff00;
transition:8s linear;
}

#result{
display:none;
text-align:center;
margin-top:50px;
font-size:35px;
color:#00ff00;
text-shadow:0 0 20px #00ff00;
}

@keyframes blink{
50%{opacity:0;}
}

.cursor{
animation:blink .7s infinite;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal" class="glow"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="result">
😂 GOT YOU!<br><br>
Your device is completely SAFE ✅<br><br>
😎 This was only a demo by <b>Sahil</b>
</div>

<script>
const messages = [
    "🔒 Connecting to AI Server...",
    "📡 Secure connection established...",
    "📱 Device detected...",
    "🔍 Running system scan...",
    "📂 Checking storage...",
    "🤖 AI analysis started...",
    "████████████████ 100%",
    "",
    "✅ Device Status : SAFE",
    "😎 Welcome to the demo!"
];

let line = 0;

function typeLine() {
    if (line < messages.length) {
        document.getElementById("typing").innerHTML += messages[line] + "<br>";
        line++;
        setTimeout(typeLine, 700);
    }
}

typeLine();
const lines=[
"🔒 Connecting to AI Server...",
"📡 Establishing Secure Connection...",
"🌍 IP Address Detected...",
"📱 Device Identified...",
"📷 Camera Status : Protected",
"📂 Checking Storage...",
"📶 Network Stable",
"🤖 Running AI Analysis...",
"⚡ Encrypting Session...",
"████████████████████ 100%",
"✔ Scan Complete"
];

let i=0;

function type(){

if(i<lines.length){

document.getElementById("terminal").innerHTML+=lines[i]+"<br>";

i++;

setTimeout(type,900);

}else{

document.getElementById("bar").style.width="100%";

setTimeout(()=>{

document.getElementById("terminal").style.display="none";

document.querySelector(".progress").style.display="none";

document.getElementById("result").style.display="block";

},9000);

}

}

type();

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size=16;
const columns=Math.floor(canvas.width/size);
const drops=Array(columns).fill(1);

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*size,drops[i]*size);

if(drops[i]*size>canvas.height && Math.random()>0.98)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,35);

</script>


<button onclick="start()">▶ Enter</button>

<audio id="music" loop>
    <source src="creepy.mp3" type="audio/mpeg">
</audio>

<script>
function start() {
    document.getElementById("music").play();
    document.querySelector("button").style.display = "none";
}
</script>

</body>
</html>
